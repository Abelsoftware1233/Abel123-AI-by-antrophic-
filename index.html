<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS // AI Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="scanlines"></div>

<div class="app">

  <header class="hud">
    <div class="hud-left">
      <div class="core" id="core">
        <span class="core-ring r1"></span>
        <span class="core-ring r2"></span>
        <span class="core-dot"></span>
      </div>
      <div class="hud-title">
        <h1>NEXUS<span class="dim">//</span><span class="link">CLAUDE-LINK</span></h1>
        <p class="hud-sub" id="status">status: <span id="statusText" class="ok">verbonden</span></p>
      </div>
    </div>
    <div class="hud-right">
      <button id="clearBtn" class="ghost-btn" title="Gesprek wissen">RESET</button>
    </div>
  </header>

  <main class="log" id="log">
    <div class="log-line system">
      <span class="ts">00:00:00</span>
      <span class="tag sys">SYS</span>
      <span class="msg">NEXUS online. Verbinding met Claude-API tot stand gebracht. Typ een bericht om te beginnen.</span>
    </div>
  </main>

  <form class="cmdline" id="cmdForm">
    <span class="prompt">&gt;</span>
    <input
      type="text"
      id="cmdInput"
      autocomplete="off"
      placeholder="schrijf een bericht..."
      autofocus
    >
    <button type="submit" id="sendBtn">SEND</button>
  </form>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
